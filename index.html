<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        var t = localStorage.getItem("fi-dashboard-theme");
        if (t === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rwanda Lifestyle & Income Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p style="padding: 1rem; font-family: system-ui, sans-serif;">Rwanda FI Dashboard requires JavaScript. Enable it and reload.</p>
    </noscript>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
